version: "3.8"

services:
  classifier-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sensitive-data-classifier
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ELASTICSEARCH_HOST=elasticsearch:9200
    volumes:
      - ./logs:/app/logs
    depends_on:
      - elasticsearch
    networks:
      - classifier-network

  elasticsearch:
    image: elasticsearch:8.9.0
    container_name: classifier-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - classifier-network

  kibana:
    image: kibana:8.9.0
    container_name: classifier-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - classifier-network

volumes:
  elasticsearch-data:

networks:
  classifier-network:
    driver: bridge
